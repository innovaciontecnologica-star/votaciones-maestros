<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="L.I.E. Arturo Palacios González">

    <title>Portal de Despedida - CGB</title>

    <!-- LIBRERÍAS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        /* ==========================================
           BODY
        ========================================== */

        body{
            background:#232f65;
            min-height:100vh;
            font-family:sans-serif;
        }

        /* ==========================================
           INTRO CINEMÁTICO
        ========================================== */

        #introScreen{

            position:fixed;
            inset:0;

            z-index:200;

            overflow:hidden;

            display:flex;
            flex-direction:column;

            align-items:center;
            justify-content:center;

            background:
                linear-gradient(
                    135deg,
                    #050816 0%,
                    #101935 45%,
                    #1b0f1f 100%
                );

        }

        .bgGlow1{

            position:absolute;

            width:350px;
            height:350px;

            border-radius:9999px;

            background:rgba(235,94,36,.25);

            filter:blur(80px);

            top:-100px;
            left:-100px;

            animation:pulseGlow 5s ease-in-out infinite;

        }

        .bgGlow2{

            position:absolute;

            width:350px;
            height:350px;

            border-radius:9999px;

            background:rgba(211,18,39,.25);

            filter:blur(80px);

            bottom:-100px;
            right:-100px;

            animation:pulseGlow 5s ease-in-out infinite;

        }

        @keyframes pulseGlow{

            0%,100%{

                transform:scale(1);
                opacity:.7;

            }

            50%{

                transform:scale(1.12);
                opacity:1;

            }

        }

        /* ==========================================
           LOGO
        ========================================== */

        .logoWrapper{

            position:relative;

            display:flex;

            align-items:center;
            justify-content:center;

            margin-bottom:45px;

        }

        .logoRing{

            position:absolute;

            width:310px;
            height:310px;

            border-radius:9999px;

            border:2px solid rgba(235,94,36,.18);

            box-shadow:
                0 0 35px rgba(235,94,36,.25),
                inset 0 0 25px rgba(235,94,36,.12);

            animation:rotateRing 16s linear infinite;

        }

        @keyframes rotateRing{

            from{
                transform:rotate(0deg);
            }

            to{
                transform:rotate(360deg);
            }

        }

        .logoPanel{

            position:relative;

            width:260px;
            height:260px;

            border-radius:36px;

            display:flex;

            align-items:center;
            justify-content:center;

            background:
                linear-gradient(
                    145deg,
                    rgba(255,255,255,.10),
                    rgba(255,255,255,.04)
                );

            backdrop-filter:blur(16px);

            border:1px solid rgba(255,255,255,.12);

            box-shadow:
                0 0 45px rgba(235,94,36,.18),
                0 0 80px rgba(211,18,39,.10),
                inset 0 0 30px rgba(255,255,255,.03);

            animation:floatLogo 4s ease-in-out infinite;

        }

        @keyframes floatLogo{

            0%,100%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-10px);
            }

        }

        .logoImage{

            width:215px;

            filter:
                drop-shadow(0 0 15px rgba(235,94,36,.35))
                drop-shadow(0 0 35px rgba(211,18,39,.25));

        }

        /* ==========================================
           BOTÓN
        ========================================== */

        #startBtn{

            background:#232f65;

            color:white;

            border:none;

            padding:16px 32px;

            border-radius:20px;

            font-size:18px;
            font-weight:700;

            letter-spacing:.12em;

            cursor:pointer;

            transition:.3s;

            box-shadow:
                0 10px 30px rgba(0,0,0,.35);

            display:flex;

            align-items:center;
            gap:12px;

            position:relative;

            z-index:5;

        }

        #startBtn:hover{

            transform:scale(1.05);

            background:#1a234b;

        }

        /* ==========================================
           LOADING
        ========================================== */

        #loadingAnim{

            display:none;

            flex-direction:column;

            align-items:center;

            margin-top:28px;

            z-index:5;

        }

        .loadingDots{

            display:flex;
            gap:12px;

        }

        .dot{

            width:14px;
            height:14px;

            border-radius:9999px;

            animation:pulseDot 1.5s infinite ease-in-out;

        }

        .dot1{ background:#eb5e24; }

        .dot2{
            background:#d31227;
            animation-delay:.2s;
        }

        .dot3{
            background:#232f65;
            animation-delay:.4s;
        }

        @keyframes pulseDot{

            0%,100%{

                transform:scale(.8);
                opacity:.4;

            }

            50%{

                transform:scale(1.2);
                opacity:1;

            }

        }

        .loadingText{

            color:white;

            margin-top:18px;

            font-size:13px;

            font-weight:700;

            letter-spacing:.25em;

            text-transform:uppercase;

        }

        /* ==========================================
           ALERTA AUDIO
        ========================================== */

        #customAlert{

            display:none;

            position:fixed;

            bottom:30px;
            left:50%;

            transform:translateX(-50%);

            background:#dc2626;

            color:white;

            padding:14px 22px;

            border-radius:14px;

            font-size:14px;

            font-weight:700;

            box-shadow:
                0 10px 30px rgba(0,0,0,.35);

            z-index:300;

        }

        /* ==========================================
           FADE OUT
        ========================================== */

        .fade-out{

            animation:fadeOutAnim .8s ease forwards;

        }

        @keyframes fadeOutAnim{

            to{

                opacity:0;
                visibility:hidden;

            }

        }

    </style>
</head>

<body class="bg-[#232f65] min-h-screen font-sans">

    <!-- AUDIO -->
    <audio id="dragonAudio" preload="auto" playsinline>
        <source src="./dragon.mp3" type="audio/mpeg">
    </audio>

    <!-- ==========================================
         INTRO SCREEN
    ========================================== -->

    <div id="introScreen">

        <div class="bgGlow1"></div>
        <div class="bgGlow2"></div>

        <div class="logoWrapper">

            <div class="logoRing"></div>

            <div class="logoPanel">

                <img
                    src="./guardianes.png"
                    alt="Guardianes"
                    class="logoImage"
                >

            </div>

        </div>

        <button id="startBtn">

            <span>TERRITORIO GUARDIAN</span>

            <span style="font-size:26px;">🐉</span>

        </button>

        <div id="loadingAnim">

            <div class="loadingDots">

                <div class="dot dot1"></div>
                <div class="dot dot2"></div>
                <div class="dot dot3"></div>

            </div>

            <div class="loadingText">

                ACTIVANDO SISTEMA...

            </div>

        </div>

        <div id="customAlert">

            No se encontró dragon.mp3

        </div>

    </div>

    <!-- BARRA -->
    <div class="flex h-2 w-full fixed top-0 z-50">
        <div class="bg-[#eb5e24] w-1/3"></div>
        <div class="bg-[#d31227] w-1/3"></div>
        <div class="bg-[#232f65] w-1/3"></div>
    </div>

    <!-- MENÚ PRINCIPAL -->
    <div id="mainMenuScreen" class="min-h-screen flex items-center justify-center p-4">

        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden p-8 text-center">

            <h1 class="text-3xl font-bold text-[#232f65] mb-2">
                Colegio CGB
            </h1>

            <p class="text-gray-500 mb-8">
                Portal de Despedida de Generación
            </p>

            <div class="space-y-4">

                <button
                    onclick="showScreen('votingScreen')"
                    class="w-full border-2 border-[#232f65] hover:bg-[#232f65] hover:text-white text-[#232f65] font-bold py-4 rounded-xl transition"
                >
                    🎓 Soy Alumno (Votar)
                </button>

                <button
                    onclick="openLogin('admin')"
                    class="w-full border-2 border-gray-300 hover:border-[#eb5e24] hover:bg-[#eb5e24] hover:text-white text-gray-600 font-semibold py-3 rounded-xl transition"
                >
                    ⚙️ Perfil Administrativo
                </button>

                <button
                    onclick="openLogin('director')"
                    class="w-full border-2 border-gray-300 hover:border-[#d31227] hover:bg-[#d31227] hover:text-white text-gray-600 font-semibold py-3 rounded-xl transition"
                >
                    📊 Perfil Directivo
                </button>

            </div>

        </div>

    </div>

    <!-- LOGIN -->
    <div id="loginScreen" class="hidden min-h-screen flex items-center justify-center p-4">

        <div class="max-w-sm w-full bg-white rounded-2xl p-8 text-center">

            <button
                onclick="showScreen('mainMenuScreen')"
                class="mb-6 text-gray-500"
            >
                ← Volver
            </button>

            <h2
                id="loginTitle"
                class="text-2xl font-bold text-[#232f65] mb-6"
            >
                Acceso
            </h2>

            <input
                type="password"
                id="passwordInput"
                placeholder="Contraseña"
                class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-4 text-center"
            >

            <button
                onclick="checkPassword()"
                class="w-full bg-[#232f65] text-white py-3 rounded-lg"
            >
                Entrar
            </button>

            <p
                id="loginError"
                class="hidden text-red-500 text-sm mt-4"
            >
                Contraseña incorrecta
            </p>

        </div>

    </div>

    <!-- VOTACIÓN -->
    <div id="votingScreen" class="hidden min-h-screen flex items-center justify-center p-4">

        <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-6">

            <button
                onclick="showScreen('mainMenuScreen')"
                class="mb-4 text-gray-500"
            >
                ← Volver
            </button>

            <h1 class="text-2xl font-bold text-[#232f65] mb-6 text-center">
                🎓 Tu Voto
            </h1>

            <form id="voteForm" class="space-y-5">

                <input
                    type="email"
                    id="email"
                    required
                    placeholder="Correo institucional"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300"
                >

                <select
                    id="maestro"
                    required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300"
                >

                    <option value="">
                        Selecciona tu favorito
                    </option>

                    <option value="Arturo">
                        Arturo
                    </option>

                    <option value="Laura">
                        Laura
                    </option>

                    <option value="Israel">
                        Israel
                    </option>

                </select>

                <button
                    type="submit"
                    class="w-full bg-[#d31227] text-white py-3 rounded-lg"
                >
                    Enviar voto
                </button>

            </form>

            <div
                id="successMessage"
                class="hidden text-center mt-6 text-green-600 font-bold"
            >
                ¡Voto registrado!
            </div>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="hidden min-h-screen bg-gray-100">

        <header class="bg-[#232f65] text-white p-6">

            <div class="max-w-6xl mx-auto flex justify-between items-center">

                <div>

                    <h1 class="text-2xl font-bold">
                        📊 Panel de Resultados
                    </h1>

                    <p id="dashboardRoleLabel">
                        Perfil
                    </p>

                </div>

                <button
                    onclick="cargarDatos()"
                    class="bg-[#eb5e24] px-4 py-2 rounded-lg"
                >
                    Actualizar
                </button>

            </div>

        </header>

        <main class="p-6 max-w-6xl mx-auto">

            <div class="bg-white rounded-xl shadow-md p-6 mb-6">

                <h3 class="text-gray-500 font-semibold">
                    VOTOS TOTALES
                </h3>

                <p
                    id="totalVotos"
                    class="text-4xl font-bold text-[#232f65]"
                >
                    0
                </p>

            </div>

            <div class="bg-white rounded-xl shadow-md p-6">

                <canvas id="votosChart"></canvas>

            </div>

        </main>

    </div>

    <!-- ==========================================
         SCRIPT GENERAL
    ========================================== -->

    <script>

        const SCRIPT_URL =
            'TU_APPS_SCRIPT_AQUI';

        const DOMINIO_INSTITUCIONAL =
            '@cgb.edu.mx';

        const screens = [
            'mainMenuScreen',
            'loginScreen',
            'votingScreen',
            'dashboardScreen'
        ];

        let currentLoginRole = '';

        let miGrafica = null;

        /* ==========================================
           AUDIO + INTRO
        ========================================== */

        const startBtn =
            document.getElementById('startBtn');

        startBtn.addEventListener('click', async function(){

            if(navigator.vibrate){

                navigator.vibrate([
                    200,
                    100,
                    300,
                    100,
                    500
                ]);

            }

            const audio =
                document.getElementById('dragonAudio');

            try{

                audio.load();

                audio.currentTime = 0;

                audio.volume = 1;

                await audio.play();

            }catch(error){

                const alertBox =
                    document.getElementById('customAlert');

                alertBox.style.display = 'block';

                setTimeout(()=>{

                    alertBox.style.display = 'none';

                },4000);

            }

            startBtn.style.display = 'none';

            document
                .getElementById('loadingAnim')
                .style.display = 'flex';

            setTimeout(()=>{

                const intro =
                    document.getElementById('introScreen');

                intro.classList.add('fade-out');

                setTimeout(()=>{

                    intro.remove();

                },800);

            },4500);

        });

        /* ==========================================
           NAVEGACIÓN
        ========================================== */

        function showScreen(screenId){

            screens.forEach(id=>{

                document
                    .getElementById(id)
                    .classList
                    .add('hidden');

            });

            document
                .getElementById(screenId)
                .classList
                .remove('hidden');

        }

        function openLogin(role){

            currentLoginRole = role;

            const title =
                role === 'admin'
                ? 'Acceso Administrativo'
                : 'Acceso Directivo';

            document
                .getElementById('loginTitle')
                .innerText = title;

            showScreen('loginScreen');

        }

        /* ==========================================
           LOGIN
        ========================================== */

        function checkPassword(){

            const pass =
                document.getElementById('passwordInput').value;

            if(
                currentLoginRole === 'admin'
                && pass === 'ADMIN2026'
            ){

                document
                    .getElementById('dashboardRoleLabel')
                    .innerText = 'VISTA ADMINISTRADOR';

                showScreen('dashboardScreen');

                cargarDatos();

            }

            else if(
                currentLoginRole === 'director'
                && pass === 'DIR2026'
            ){

                document
                    .getElementById('dashboardRoleLabel')
                    .innerText = 'VISTA DIRECTIVA';

                showScreen('dashboardScreen');

                cargarDatos();

            }

            else{

                document
                    .getElementById('loginError')
                    .classList
                    .remove('hidden');

            }

        }

        /* ==========================================
           FORMULARIO
        ========================================== */

        document
            .getElementById('voteForm')
            .addEventListener('submit', async(e)=>{

                e.preventDefault();

                document
                    .getElementById('successMessage')
                    .classList
                    .remove('hidden');

            });

        /* ==========================================
           DASHBOARD
        ========================================== */

        async function cargarDatos(){

            const datos = {

                Arturo:5,
                Laura:3,
                Israel:7

            };

            document
                .getElementById('totalVotos')
                .innerText = 15;

            dibujarGrafica(datos);

        }

        function dibujarGrafica(datos){

            const ctx =
                document
                    .getElementById('votosChart')
                    .getContext('2d');

            const maestros =
                Object.keys(datos);

            const votos =
                Object.values(datos);

            if(miGrafica){

                miGrafica.destroy();

            }

            miGrafica = new Chart(ctx, {

                type:'bar',

                data:{

                    labels:maestros,

                    datasets:[{

                        label:'Votos',

                        data:votos,

                        backgroundColor:'#232f65',

                        borderRadius:6

                    }]

                },

                options:{

                    responsive:true,

                    plugins:{

                        legend:{
                            display:false
                        }

                    }

                }

            });

        }

    </script>

</body>
</html>
