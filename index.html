<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="L.I.E. Arturo Palacios González">

<title>Portal de Despedida - CGB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    overflow-x:hidden;
}

/* =========================
   INTRO / CORTINILLA
========================= */

.dragon-glow{
    animation: glowPulse 2.5s infinite ease-in-out;
}

@keyframes glowPulse{
    0%,100%{
        transform: scale(1);
        filter: drop-shadow(0 0 15px rgba(235,94,36,.5));
    }
    50%{
        transform: scale(1.06);
        filter:
        drop-shadow(0 0 25px rgba(235,94,36,.9))
        drop-shadow(0 0 40px rgba(211,18,39,.6));
    }
}

.portal-bg{
    background:
    radial-gradient(circle at top,#ffffff 0%,#f3f4f6 45%,#dbeafe 100%);
}

/* =========================
   LOADING DOTS
========================= */

.dot-pulse{
    animation:pulseDot 1.5s infinite ease-in-out;
}

.dot-delay-1{
    animation-delay:.2s;
}

.dot-delay-2{
    animation-delay:.4s;
}

@keyframes pulseDot{
    0%,100%{
        transform:scale(.8);
        opacity:.3;
    }
    50%{
        transform:scale(1.2);
        opacity:1;
    }
}

/* =========================
   FADE OUT
========================= */

.fade-out{
    animation:fadeOutAnim .8s ease-in-out forwards;
}

@keyframes fadeOutAnim{
    to{
        opacity:0;
        visibility:hidden;
    }
}

</style>
</head>

<body class="bg-[#232f65] min-h-screen font-sans">

<!-- =========================================
     AUDIO
========================================= -->

<audio id="dragonAudio" preload="auto" playsinline>
    <source src="dragon.mp3" type="audio/mpeg">
</audio>

<!-- =========================================
     INTRO SCREEN
========================================= -->

<div id="introScreen"
class="fixed inset-0 z-[999] portal-bg flex flex-col items-center justify-center p-4">

    <!-- Aura -->
    <div class="absolute w-[320px] h-[320px] bg-orange-400/20 rounded-full blur-3xl"></div>

    <!-- Logo -->
    <img
    src="guardianes.png"
    alt="Guardianes"
    class="dragon-glow relative z-10 w-[85vw] max-w-[420px] md:max-w-[500px] object-contain mb-8">

    <!-- Button -->
    <button id="startBtn"
    class="relative z-10 bg-[#232f65] hover:bg-[#1a234b]
    text-white px-8 py-4 rounded-2xl
    font-bold text-xl shadow-2xl
    transition duration-300
    hover:scale-105
    border-2 border-[#eb5e24]
    flex items-center gap-3">

        <span class="tracking-widest uppercase">
            Territorio Guardian
        </span>

        <span class="text-2xl">🐉</span>
    </button>

    <!-- Loading -->
    <div id="loadingAnim"
    class="hidden flex-col items-center mt-6 relative z-10">

        <div class="flex items-center gap-3">
            <div class="w-4 h-4 bg-[#eb5e24] rounded-full dot-pulse"></div>
            <div class="w-4 h-4 bg-[#d31227] rounded-full dot-pulse dot-delay-1"></div>
            <div class="w-4 h-4 bg-[#232f65] rounded-full dot-pulse dot-delay-2"></div>
        </div>

        <p class="text-[#232f65] text-sm font-bold mt-4 tracking-widest uppercase">
            Activando sistema...
        </p>
    </div>

    <!-- Error -->
    <div id="customAlert"
    class="hidden fixed bottom-6 left-1/2 -translate-x-1/2
    bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl z-[1000] text-sm font-semibold">

        No se pudo reproducir el audio.
    </div>

</div>

<!-- =========================================
     TOP BAR
========================================= -->

<div class="flex h-2 w-full fixed top-0 z-50">
    <div class="bg-[#eb5e24] w-1/3"></div>
    <div class="bg-[#d31227] w-1/3"></div>
    <div class="bg-[#232f65] w-1/3"></div>
</div>

<!-- =========================================
     MAIN MENU
========================================= -->

<div id="mainMenuScreen"
class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8 text-center">

        <h1 class="text-3xl font-bold text-[#232f65] mb-2">
            Colegio CGB
        </h1>

        <p class="text-gray-500 mb-8">
            Portal de Despedida de Generación
        </p>

        <h2 class="text-lg font-semibold text-gray-700 mb-4">
            Selecciona tu perfil:
        </h2>

        <div class="space-y-4">

            <button onclick="showScreen('votingScreen')"
            class="w-full border-2 border-[#232f65]
            hover:bg-[#232f65]
            hover:text-white
            text-[#232f65]
            font-bold py-4 rounded-xl transition">

                🎓 Soy Alumno (Votar)

            </button>

            <button onclick="openLogin('admin')"
            class="w-full border-2 border-gray-300
            hover:border-[#eb5e24]
            hover:bg-[#eb5e24]
            hover:text-white
            text-gray-700
            font-semibold py-3 rounded-xl transition">

                ⚙️ Perfil Administrativo

            </button>

            <button onclick="openLogin('director')"
            class="w-full border-2 border-gray-300
            hover:border-[#d31227]
            hover:bg-[#d31227]
            hover:text-white
            text-gray-700
            font-semibold py-3 rounded-xl transition">

                📊 Perfil Directivo

            </button>

        </div>

    </div>

</div>

<!-- =========================================
     LOGIN
========================================= -->

<div id="loginScreen"
class="hidden min-h-screen flex items-center justify-center p-4">

    <div class="max-w-sm w-full bg-white rounded-2xl shadow-2xl p-8 relative text-center">

        <button onclick="showScreen('mainMenuScreen')"
        class="absolute top-4 left-4 text-gray-400 hover:text-[#232f65]">

            ←

        </button>

        <h2 id="loginTitle"
        class="text-2xl font-bold text-[#232f65] mb-6">

            Acceso

        </h2>

        <input type="password"
        id="passwordInput"
        placeholder="Contraseña"
        class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-4">

        <button onclick="checkPassword()"
        class="w-full bg-[#232f65] hover:bg-[#1a234b]
        text-white font-bold py-3 rounded-lg">

            Entrar

        </button>

        <p id="loginError"
        class="hidden text-red-500 text-sm mt-3">

            Contraseña incorrecta

        </p>

    </div>

</div>

<!-- =========================================
     VOTING SCREEN
========================================= -->

<div id="votingScreen"
class="hidden min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">

        <div class="bg-[#1a234b] p-6 text-white text-center">

            <h1 class="text-2xl font-bold mb-2">
                🎓 Tu Voto
            </h1>

            <p class="text-sm text-gray-200">
                Elige al maestro que dará el último pase de lista.
            </p>

        </div>

        <div class="p-6">

            <form id="voteForm" class="space-y-5">

                <div>

                    <label class="block text-sm font-medium mb-1">
                        Correo Institucional
                    </label>

                    <input
                    type="email"
                    id="email"
                    required
                    placeholder="ejemplo@cgb.edu.mx"
                    class="w-full px-4 py-3 rounded-lg border border-gray-300">

                </div>

                <div>

                    <label class="block text-sm font-medium mb-1">
                        Maestro Nominado
                    </label>

                    <select
                    id="maestro"
                    required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 bg-white">

                        <option value="">Selecciona...</option>

                        <option>Karla — Español</option>
                        <option>Cecilia — Matemáticas</option>
                        <option>Laura — Ciencias</option>
                        <option>Ariadna — Historia</option>
                        <option>Bibiana — Formación Cívica</option>
                        <option>Arturo — Tecnología</option>
                        <option>Israel — Inglés</option>
                        <option>Sara — Inglés</option>
                        <option>Branda — Inglés</option>
                        <option>Nadia — Inglés</option>
                        <option>Diana — Educación Física</option>
                        <option>Tania — Educación Física</option>
                        <option>Ricardo — Educación Física</option>
                        <option>Antonio — Artes</option>
                        <option>Yaritza — Artes</option>
                        <option>Pilar — Artes</option>
                        <option>Mariana — Artes</option>
                        <option>Ivonne — Artes</option>
                        <option>Sarai — Francés</option>

                    </select>

                </div>

                <button type="submit"
                id="submitBtn"
                class="w-full bg-[#d31227]
                hover:bg-[#b00f20]
                text-white font-semibold py-3 rounded-lg">

                    Enviar mi voto

                </button>

            </form>

            <div id="successMessage"
            class="hidden text-center py-6">

                <h3 class="text-2xl font-bold text-green-600 mb-2">
                    ✅ ¡Voto Registrado!
                </h3>

                <button onclick="showScreen('mainMenuScreen')"
                class="text-[#232f65] font-semibold hover:underline">

                    Volver al inicio

                </button>

            </div>

            <div id="errorMessage"
            class="hidden mt-4 p-4 rounded-lg
            bg-red-50 text-red-600 text-sm text-center border border-red-200">

                <span id="errorText"></span>

            </div>

        </div>

    </div>

</div>

<!-- =========================================
     DASHBOARD
========================================= -->

<div id="dashboardScreen"
class="hidden min-h-screen bg-gray-100">

    <header class="bg-[#232f65] text-white p-6">

        <div class="max-w-6xl mx-auto flex justify-between items-center">

            <div>

                <h1 class="text-2xl font-bold">
                    📊 Panel de Resultados
                </h1>

                <p id="dashboardRoleLabel"
                class="text-[#eb5e24] text-sm">

                    Perfil

                </p>

            </div>

            <button onclick="cargarDatos()"
            class="bg-[#eb5e24] px-4 py-2 rounded-lg font-semibold">

                Actualizar

            </button>

        </div>

    </header>

    <main class="p-6 max-w-6xl mx-auto">

        <div class="bg-white rounded-xl shadow-md p-6 mb-6">

            <h3 class="text-gray-500 font-semibold">
                TOTAL DE VOTOS
            </h3>

            <p id="totalVotos"
            class="text-5xl font-bold text-[#232f65]">

                0

            </p>

        </div>

        <div class="bg-white rounded-xl shadow-md p-6">

            <canvas id="votosChart"></canvas>

        </div>

    </main>

</div>

<script>

/* =========================================
   AUDIO + INTRO
========================================= */

document.getElementById('startBtn')
.addEventListener('click', async function(){

    if(navigator.vibrate){
        navigator.vibrate([200,100,300,100,500]);
    }

    const audio = document.getElementById('dragonAudio');

    try{

        audio.currentTime = 0;
        audio.volume = 1;

        await audio.play();

    }catch(err){

        console.log(err);

        document.getElementById('customAlert')
        .classList.remove('hidden');

    }

    this.classList.add('hidden');

    const loader = document.getElementById('loadingAnim');

    loader.classList.remove('hidden');
    loader.classList.add('flex');

    setTimeout(()=>{

        document.getElementById('introScreen')
        .classList.add('fade-out');

    },4500);

});

/* =========================================
   APPS SCRIPT URL
========================================= */

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbywJeMgnoTQgQpaKirpiQo2y7w02WifsOQt6wl9nvyegcbyltdQ_OTv7mAKuYaC4qRe7A/exec';

const DOMINIO_INSTITUCIONAL = '@cgb.edu.mx';

const screens = [
    'mainMenuScreen',
    'loginScreen',
    'votingScreen',
    'dashboardScreen'
];

let currentLoginRole = '';
let miGrafica = null;

/* =========================================
   NAVIGATION
========================================= */

function showScreen(screenId){

    screens.forEach(id=>{
        document.getElementById(id).classList.add('hidden');
    });

    document.getElementById(screenId)
    .classList.remove('hidden');

}

/* =========================================
   LOGIN
========================================= */

function openLogin(role){

    currentLoginRole = role;

    document.getElementById('loginTitle').innerText =
    role === 'admin'
    ? 'Acceso Administrativo'
    : 'Acceso Directivo';

    showScreen('loginScreen');

}

function checkPassword(){

    const pass =
    document.getElementById('passwordInput').value;

    if(currentLoginRole === 'admin' && pass === 'ADMIN2026'){

        document.getElementById('dashboardRoleLabel')
        .innerText = 'VISTA ADMIN';

        showScreen('dashboardScreen');

        cargarDatos();

    }else if(currentLoginRole === 'director' && pass === 'DIR2026'){

        document.getElementById('dashboardRoleLabel')
        .innerText = 'VISTA DIRECTIVA';

        showScreen('dashboardScreen');

        cargarDatos();

    }else{

        document.getElementById('loginError')
        .classList.remove('hidden');

    }

}

/* =========================================
   VOTING
========================================= */

document.getElementById('voteForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    document.getElementById('errorMessage')
    .classList.add('hidden');

    const email =
    document.getElementById('email')
    .value
    .trim()
    .toLowerCase();

    const maestro =
    document.getElementById('maestro').value;

    if(!email.endsWith(DOMINIO_INSTITUCIONAL)){

        showVotingError(
        'Usa tu correo institucional'
        );

        return;

    }

    try{

        const payload = new URLSearchParams();

        payload.append('email',email);
        payload.append('maestro',maestro);

        const response = await fetch(SCRIPT_URL,{
            method:'POST',
            body:payload
        });

        const result = await response.json();

        if(result.status === 'exito'){

            document.getElementById('voteForm')
            .classList.add('hidden');

            document.getElementById('successMessage')
            .classList.remove('hidden');

        }else if(result.status === 'duplicado'){

            showVotingError(
            'Este correo ya votó'
            );

        }else if(result.status === 'invalido'){

            showVotingError(
            'Correo no autorizado'
            );

        }else{

            showVotingError(
            'Error al guardar'
            );

        }

    }catch(err){

        console.log(err);

        showVotingError(
        'Error de conexión'
        );

    }

});

function showVotingError(msg){

    document.getElementById('errorText')
    .innerText = msg;

    document.getElementById('errorMessage')
    .classList.remove('hidden');

}

/* =========================================
   DASHBOARD
========================================= */

async function cargarDatos(){

    try{

        const response = await fetch(SCRIPT_URL);

        const data = await response.json();

        if(data.status === 'exito'){

            document.getElementById('totalVotos')
            .innerText = data.total;

            dibujarGrafica(data.grafica);

        }

    }catch(err){

        console.log(err);

    }

}

function dibujarGrafica(datos){

    const ctx =
    document.getElementById('votosChart');

    if(miGrafica){
        miGrafica.destroy();
    }

    miGrafica = new Chart(ctx,{
        type:'bar',
        data:{
            labels:Object.keys(datos),
            datasets:[{
                label:'Votos',
                data:Object.values(datos),
                backgroundColor:'#232f65'
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false
        }
    });

}

</script>

</body>
</html>
