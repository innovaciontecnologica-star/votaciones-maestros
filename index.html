<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="L.I.E. Arturo Palacios González">

<title>Portal de Despedida - CGB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    margin:0;
    padding:0;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:#050816;
}

/* =========================================
BARRA SUPERIOR
========================================= */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:8px;
    display:flex;
    z-index:1000;
}

.topbar div:nth-child(1){
    background:#eb5e24;
    flex:1;
}

.topbar div:nth-child(2){
    background:#d31227;
    flex:1;
}

.topbar div:nth-child(3){
    background:#232f65;
    flex:1;
}

/* =========================================
CORTINILLA
========================================= */

#introScreen{
    position:fixed;
    inset:0;
    z-index:9999;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    background:
    radial-gradient(circle at center,
    #1d2b74 0%,
    #090d22 55%,
    #000 100%);

    overflow:hidden;
}

.energy-ring{
    position:absolute;
    width:420px;
    height:420px;
    border-radius:50%;

    border:2px solid rgba(235,94,36,.22);

    box-shadow:
    0 0 60px rgba(235,94,36,.35),
    inset 0 0 60px rgba(211,18,39,.15);

    animation:spinRing 14s linear infinite;
}

.logo-card{

    position:relative;

    width:340px;
    max-width:85vw;

    border-radius:38px;

    overflow:hidden;

    padding:18px;

    background:
    linear-gradient(
    145deg,
    rgba(255,255,255,.12),
    rgba(255,255,255,.03)
    );

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 0 80px rgba(211,18,39,.20),
    0 0 120px rgba(35,47,101,.35);

    animation:floatLogo 5s ease-in-out infinite;
}

.logo-card img{
    width:100%;
    display:block;

    filter:
    drop-shadow(0 0 15px rgba(255,255,255,.25))
    drop-shadow(0 0 35px rgba(235,94,36,.20));
}

#startBtn{

    margin-top:38px;

    border:none;
    border-radius:20px;

    padding:18px 38px;

    background:
    linear-gradient(90deg,#eb5e24,#d31227);

    color:white;

    font-size:1.15rem;
    font-weight:bold;

    letter-spacing:1px;

    cursor:pointer;

    box-shadow:
    0 0 30px rgba(211,18,39,.45);

    transition:.3s;
}

#startBtn:hover{
    transform:scale(1.05);
}

#loadingAnim{
    display:none;
    margin-top:28px;
    text-align:center;
    color:white;
}

.loader{
    width:70px;
    height:70px;

    border-radius:50%;

    border:6px solid rgba(255,255,255,.15);
    border-top:6px solid #eb5e24;

    animation:spinRing 1s linear infinite;

    margin:auto;
}

.fade-out{
    animation:fadeOut .9s forwards;
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

@keyframes spinRing{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes floatLogo{
    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }
}

/* =========================================
PANTALLAS
========================================= */

.hidden{
    display:none !important;
}

.screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{

    width:100%;
    max-width:500px;

    background:#1f1f1f;

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 0 40px rgba(0,0,0,.45);
}

.header{
    background:#04044d;
    padding:40px 25px;
    text-align:center;
    color:white;
}

.content{
    padding:30px;
}

.main-btn{

    width:100%;

    padding:18px;

    border:none;

    border-radius:18px;

    background:#c60019;

    color:white;

    font-size:1.15rem;
    font-weight:bold;

    cursor:pointer;

    transition:.3s;
}

.main-btn:hover{
    background:#a70015;
}

input,
select{

    width:100%;

    padding:18px;

    margin-top:10px;
    margin-bottom:25px;

    border-radius:16px;

    border:1px solid #555;

    background:#393939;

    color:white;

    font-size:1rem;
}

.error-box{

    margin-top:20px;

    padding:18px;

    border-radius:16px;

    background:#2c1616;

    border:1px solid #7d3a3a;

    color:#ff8d8d;

    text-align:center;
}

.success-box{

    margin-top:20px;

    padding:18px;

    border-radius:16px;

    background:#143018;

    border:1px solid #2d8041;

    color:#7dff93;

    text-align:center;
}

</style>
</head>

<body>

<!-- =========================================
BARRA SUPERIOR
========================================= -->

<div class="topbar">
    <div></div>
    <div></div>
    <div></div>
</div>

<!-- =========================================
AUDIO
========================================= -->

<audio id="dragonAudio" preload="auto" playsinline>
    <source src="./dragon.mp3" type="audio/mpeg">
</audio>

<!-- =========================================
CORTINILLA
========================================= -->

<div id="introScreen">

    <div class="energy-ring"></div>

    <div class="logo-card">

        <img
        src="./guardianes.png"
        alt="Guardianes CGB">

    </div>

    <button id="startBtn">
        TERRITORIO GUARDIÁN 🐉
    </button>

    <div id="loadingAnim">

        <div class="loader"></div>

        <p style="
        margin-top:16px;
        font-weight:bold;
        letter-spacing:2px;
        ">
            ACTIVANDO SISTEMA...
        </p>

    </div>

</div>

<!-- =========================================
MENU PRINCIPAL
========================================= -->

<div id="mainMenuScreen"
class="screen hidden">

    <div class="card">

        <div class="header">

            <h1 style="
            font-size:2rem;
            font-weight:bold;
            ">
                Colegio CGB
            </h1>

            <p style="margin-top:10px;">
                Portal de Despedida
            </p>

        </div>

        <div class="content">

            <button
            class="main-btn"
            onclick="showScreen('votingScreen')">
                🎓 SOY ALUMNO
            </button>

        </div>

    </div>

</div>

<!-- =========================================
VOTACIÓN
========================================= -->

<div id="votingScreen"
class="screen hidden">

    <div class="card">

        <div class="header">

            <h1 style="
            font-size:2rem;
            font-weight:bold;
            ">
                🎓 Tu Voto
            </h1>

            <p style="margin-top:10px;">
                Elige al maestro que dará el último pase de lista.
            </p>

        </div>

        <div class="content">

            <form id="voteForm">

                <label style="
                color:white;
                font-weight:bold;
                ">
                    Correo Institucional
                </label>

                <input
                type="email"
                id="email"
                placeholder="ejemplo@cgb.edu.mx"
                required>

                <label style="
                color:white;
                font-weight:bold;
                ">
                    Maestro Nominado
                </label>

                <select id="maestro" required>

                    <option value="">
                        Selecciona...
                    </option>

                    <option>Karla — Español</option>
                    <option>Cecilia — Matemáticas</option>
                    <option>Laura — Ciencias</option>
                    <option>Ariadna — Historia</option>
                    <option>Bibiana — Formación Cívica</option>
                    <option>Arturo — Tecnología</option>
                    <option>Israel — Inglés</option>
                    <option>Sara — Inglés</option>
                    <option>Branda — Inglés</option>
                    <option>Nadia — Inglés</option>
                    <option>Diana — Ed. Física</option>
                    <option>Tania — Ed. Física</option>
                    <option>Ricardo — Ed. Física</option>
                    <option>Antonio — Artes</option>
                    <option>Yaritza — Artes</option>
                    <option>Pilar — Artes</option>
                    <option>Mariana — Artes</option>
                    <option>Ivonne — Artes</option>
                    <option>Sarai — Francés</option>

                </select>

                <button
                type="submit"
                class="main-btn">
                    Enviar mi voto
                </button>

            </form>

            <div id="errorMessage"
            class="error-box hidden">
            </div>

            <div id="successMessage"
            class="success-box hidden">
                ✅ Tu voto fue registrado correctamente
            </div>

        </div>

    </div>

</div>

<script>

/* =========================================
URL GOOGLE SHEETS
========================================= */

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbzG9GRnr9Mcb7hYrO1OiLDngzYDqiZooMKTG4tn3BGpZ-hKARsFYhDieYKpMxDAPJIjBQ/exec';

/* =========================================
AUDIO + CORTINILLA
========================================= */

document
.getElementById('startBtn')
.addEventListener('click', async function(){

    const btn = this;

    // Vibración
    if(navigator.vibrate){
        navigator.vibrate([200,100,300,100,500]);
    }

    // Audio
    const audio =
    document.getElementById('dragonAudio');

    try{

        audio.load();

        audio.currentTime = 0;

        audio.volume = 1;

        await audio.play();

        console.log("Audio iniciado");

    }catch(err){

        console.log("Audio bloqueado:",err);
    }

    // UI
    btn.style.display='none';

    document
    .getElementById('loadingAnim')
    .style.display='block';

    setTimeout(()=>{

        const intro =
        document.getElementById('introScreen');

        intro.classList.add('fade-out');

        setTimeout(()=>{

            intro.remove();

            document
            .getElementById('mainMenuScreen')
            .classList.remove('hidden');

        },900);

    },4000);

});

/* =========================================
CAMBIO DE PANTALLAS
========================================= */

function showScreen(id){

    document
    .querySelectorAll('.screen')
    .forEach(screen=>{

        screen.classList.add('hidden');

    });

    document
    .getElementById(id)
    .classList.remove('hidden');
}

/* =========================================
FORMULARIO
========================================= */

document
.getElementById('voteForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const email =
    document
    .getElementById('email')
    .value
    .trim()
    .toLowerCase();

    const maestro =
    document
    .getElementById('maestro')
    .value;

    const errorBox =
    document
    .getElementById('errorMessage');

    const successBox =
    document
    .getElementById('successMessage');

    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');

    // VALIDACIÓN
    if(!email.endsWith('@cgb.edu.mx')){

        errorBox.innerHTML =
        'Debes usar tu correo institucional';

        errorBox.classList.remove('hidden');

        return;
    }

    try{

        const formData = new FormData();

        formData.append('email',email);
        formData.append('maestro',maestro);

        const response =
        await fetch(SCRIPT_URL,{

            method:'POST',

            body:formData

        });

        const data =
        await response.json();

        console.log(data);

        if(data.status === 'exito'){

            successBox.classList.remove('hidden');

            document
            .getElementById('voteForm')
            .reset();

        }
        else if(data.status === 'duplicado'){

            errorBox.innerHTML =
            'Este correo ya registró un voto';

            errorBox.classList.remove('hidden');

        }
        else if(data.status === 'invalido'){

            errorBox.innerHTML =
            'Tu correo no está en el padrón oficial';

            errorBox.classList.remove('hidden');

        }
        else{

            errorBox.innerHTML =
            'Error del servidor';

            errorBox.classList.remove('hidden');
        }

    }catch(err){

        console.log(err);

        errorBox.innerHTML =
        'Error de conexión';

        errorBox.classList.remove('hidden');
    }

});

</script>

</body>
</html>
