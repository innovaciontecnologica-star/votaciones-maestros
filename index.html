<!-- ==========================================
     INTRO CINEMÁTICO MEJORADO
========================================== -->

<div
    id="introScreen"
    class="fixed inset-0 z-[200] bg-gradient-to-br from-white via-gray-100 to-orange-50 flex flex-col items-center justify-center p-4 overflow-hidden"
>

    <!-- EFECTO DE LUZ DE FONDO -->
    <div class="absolute inset-0 overflow-hidden">

        <div class="absolute w-[500px] h-[500px] bg-[#eb5e24]/20 rounded-full blur-3xl top-[-120px] left-[-120px] animate-pulse"></div>

        <div class="absolute w-[400px] h-[400px] bg-[#d31227]/20 rounded-full blur-3xl bottom-[-100px] right-[-100px] animate-pulse"></div>

    </div>

    <!-- LOGO CINEMÁTICO -->
    <div class="logo-container relative z-10">

        <!-- AURA -->
        <div class="logo-aura"></div>

        <!-- ANILLO -->
        <div class="logo-ring"></div>

        <!-- PANEL -->
        <div class="logo-panel logo-particles">

            <img
                src="guardianes.png"
                alt="Guardianes CGB"
                class="logo-image"
            >

        </div>

    </div>

    <!-- BOTÓN -->
    <button
        id="startBtn"
        class="relative z-10 bg-[#232f65] hover:bg-[#1a234b] text-white px-8 py-4 rounded-2xl font-bold text-xl shadow-2xl transition duration-300 transform hover:scale-105 flex items-center gap-3 border border-white/20 backdrop-blur-md"
    >

        <span class="uppercase tracking-[0.2em] text-lg">
            Territorio Guardian
        </span>

        <span class="text-2xl animate-pulse">
            🐉
        </span>

    </button>

    <!-- LOADING -->
    <div
        id="loadingAnim"
        class="hidden flex-col items-center mt-6 relative z-10"
    >

        <div class="flex items-center justify-center space-x-3">

            <div class="w-4 h-4 bg-[#eb5e24] rounded-full dot-pulse"></div>

            <div class="w-4 h-4 bg-[#d31227] rounded-full dot-pulse dot-delay-1"></div>

            <div class="w-4 h-4 bg-[#232f65] rounded-full dot-pulse dot-delay-2"></div>

        </div>

        <p class="text-[#232f65] text-sm mt-4 font-bold tracking-[0.25em] uppercase">

            Activando sistema...

        </p>

    </div>

    <!-- ALERTA -->
    <div
        id="customAlert"
        class="hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-xl shadow-lg text-sm text-center font-semibold z-[210]"
    >

        <span id="customAlertText">

            Error con el audio.

        </span>

    </div>

</div>

<!-- ==========================================
     CSS CINEMÁTICO
========================================== -->

<style>

    /* ==========================================
       LOGO CONTAINER
    ========================================== */

    .logo-container {

        position: relative;

        display: flex;

        align-items: center;

        justify-content: center;

        margin-bottom: 50px;

    }

    /* ==========================================
       AURA
    ========================================== */

    .logo-aura {

        position: absolute;

        width: 340px;
        height: 340px;

        border-radius: 9999px;

        background:
            radial-gradient(
                circle,
                rgba(235,94,36,0.45) 0%,
                rgba(211,18,39,0.25) 40%,
                rgba(35,47,101,0.08) 70%,
                transparent 100%
            );

        filter: blur(35px);

        animation:
            auraPulse 4s ease-in-out infinite;

    }

    /* ==========================================
       ANILLO
    ========================================== */

    .logo-ring {

        position: absolute;

        width: 290px;
        height: 290px;

        border-radius: 9999px;

        border: 2px solid rgba(235,94,36,0.25);

        box-shadow:
            0 0 25px rgba(235,94,36,0.25),
            inset 0 0 25px rgba(235,94,36,0.15);

        animation:
            rotateRing 14s linear infinite;

    }

    /* ==========================================
       PANEL
    ========================================== */

    .logo-panel {

        position: relative;

        background: rgba(255,255,255,0.88);

        backdrop-filter: blur(12px);

        border-radius: 36px;

        padding: 35px;

        border: 1px solid rgba(255,255,255,0.6);

        box-shadow:
            0 25px 60px rgba(0,0,0,0.15),
            0 0 40px rgba(235,94,36,0.20);

        animation:
            logoFloat 4s ease-in-out infinite;

    }

    /* ==========================================
       IMAGEN
    ========================================== */

    .logo-image {

        width: 230px;

        position: relative;

        z-index: 2;

        filter:
            drop-shadow(0 0 18px rgba(235,94,36,0.45))
            drop-shadow(0 0 35px rgba(211,18,39,0.25));

    }

    /* ==========================================
       PARTÍCULAS
    ========================================== */

    .logo-particles::before,
    .logo-particles::after {

        content: '';

        position: absolute;

        width: 14px;
        height: 14px;

        border-radius: 9999px;

        background: rgba(235,94,36,0.7);

        filter: blur(1px);

        animation:
            particlesFloat 5s ease-in-out infinite;

    }

    .logo-particles::before {

        top: 10%;
        left: 15%;

    }

    .logo-particles::after {

        bottom: 12%;
        right: 18%;

        animation-delay: 2s;

    }

    /* ==========================================
       ANIMACIONES
    ========================================== */

    @keyframes auraPulse {

        0%,100% {

            transform: scale(1);
            opacity: 0.8;

        }

        50% {

            transform: scale(1.08);
            opacity: 1;

        }

    }

    @keyframes rotateRing {

        from {

            transform: rotate(0deg);

        }

        to {

            transform: rotate(360deg);

        }

    }

    @keyframes logoFloat {

        0%,100% {

            transform: translateY(0px);

        }

        50% {

            transform: translateY(-10px);

        }

    }

    @keyframes particlesFloat {

        0%,100% {

            transform: translateY(0px) scale(1);
            opacity: 0.6;

        }

        50% {

            transform: translateY(-20px) scale(1.3);
            opacity: 1;

        }

    }

</style>
